<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f6fb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="番茄钟">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="番茄钟">
    <title>番茄钟月记录</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <link rel="icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css?v=20260517-centered">
  </head>
  <body>
    <main class="app" aria-label="番茄钟月记录">
      <section class="timer-panel" aria-label="番茄钟">
        <div class="time-readout" id="timeReadout">00:00</div>

        <div class="dial-wrap">
          <div class="dial" id="dial">
            <div class="ticks" id="ticks" aria-hidden="true"></div>
            <div class="tick-labels" id="tickLabels" aria-hidden="true"></div>
            <div class="hand" id="hand"></div>
            <button class="knob" id="knob" type="button" aria-label="拖动选择分钟"></button>
          </div>
        </div>

        <div class="timer-actions">
          <button class="primary-control" id="startPauseButton" type="button" aria-label="开始">
            <span id="controlIcon">▶</span>
          </button>
        </div>
      </section>

      <section class="month-panel" aria-label="月记录">
        <header class="month-header">
          <button class="month-nav" id="prevMonth" type="button" aria-label="上个月">‹</button>
          <div class="month-title">
            <strong id="monthTitle">2026 年 5 月</strong>
            <span id="monthSummary">本月番茄钟：0H</span>
          </div>
          <button class="month-nav" id="nextMonth" type="button" aria-label="下个月">›</button>
        </header>

        <div class="calendar" id="calendar" aria-label="月历"></div>

        <footer class="daily-strip">
          <button class="punch-control" id="punchButton" type="button">快捷打卡</button>
          <div class="daily-copy">
            <span id="selectedDate">2026-05-16</span>
            <span id="dailySummary">当日番茄钟：0H</span>
          </div>
        </footer>
      </section>
    </main>

    <script src="app.js?v=20260517-centered"></script>
  </body>
</html>
